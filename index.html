<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBDAAOWA Resident Verification Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-12">

    <div class="bg-blue-600 text-white text-center py-6 px-4 shadow-md">
        <h1 class="text-xl md:text-2xl font-bold">MBDAAOWA Resident Search</h1>
        <p class="text-sm text-blue-100 mt-1">ನಿವಾಸಿ ದೃಢೀಕರಣ ಪರಿಶೀಲನೆ (Read-Only Portal)</p>
    </div>

    <div class="max-w-4xl mx-auto mt-6 px-4">
        
        <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 mb-6">
            <label for="search-input" class="block text-gray-700 font-medium mb-2">Search Resident Details</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Enter Name, Flat No, Block, or Vehicle Number..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800"
                >
                <button 
                    onclick="filterData()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-md transition-colors"
                >
                    Search
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-2">*Note: You can query by Block (e.g., B18), Flat Number, or Vehicle registration details.</p>
        </div>

        <div id="status-container" class="flex justify-center items-center py-6 hidden">
            <div class="loader mr-3"></div>
            <span class="text-gray-600 font-medium" id="status-text">Fetching live data...</span>
        </div>

        <div id="results-count" class="text-sm text-gray-600 mb-3 hidden"></div>

        <div id="results-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <script>
        // Directly pointing to your Sheet ID and target range
        const SHEET_ID = '1QQ6lkJAO2oZprVqUWPyV5S4ouROkoxAJuHg_p287a14';
        const SHEET_NAME = encodeURIComponent('Form Responses 1');
        const FETCH_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        let allResidents = [];

        // Fetch data on page load
        document.addEventListener("DOMContentLoaded", () => {
            showStatus(true, "Loading resident directory...");
            fetch(FETCH_URL)
                .then(res => res.text())
                .then(text => {
                    // Clean up Google Visualization JSON sandbox wrapper
                    const data = JSON.parse(text.substr(47).slice(0, -2));
                    processGoogleData(data);
                })
                .catch(err => {
                    console.error(err);
                    showStatus(true, "Error loading database. Please check sheet privacy permissions.");
                });
        });

        function showStatus(show, text = "") {
            const container = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const loader = container.querySelector('.loader');
            
            if (show) {
                container.classList.remove('hidden');
                statusText.innerText = text;
                if(text.includes("Error")) loader.classList.add('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function processGoogleData(json) {
            const rows = json.table.rows;
            
            // Map table values precisely back to labels
            allResidents = rows.map(row => {
                return {
                    timestamp: row.c[0] ? row.c[0].f || row.c[0].v : '',
                    name: row.c[3] ? row.c[3].v : 'N/A',
                    phone: row.c[4] ? row.c[4].v : 'N/A',
                    block: row.c[5] ? row.c[5].v : 'N/A',
                    flat: row.c[6] ? row.c[6].v : 'N/A',
                    resType: row.c[7] ? row.c[7].v : 'N/A',
                    vehicle: row.c[8] ? row.c[8].v : 'N/A',
                    vType: row.c[9] ? row.c[9].v : 'N/A'
                };
            });

            showStatus(false);
            // Default show all on startup up to a sensible desktop view limit
            displayResults(allResidents);
        }

        function filterData() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (!query) {
                displayResults(allResidents);
                return;
            }

            const filtered = allResidents.filter(item => {
                return (
                    item.name.toLowerCase().includes(query) ||
                    item.block.toLowerCase().includes(query) ||
                    item.flat.toString().includes(query) ||
                    item.vehicle.toLowerCase().includes(query) ||
                    item.phone.toString().includes(query)
                );
            });

            displayResults(filtered);
        }

        // Attach listener for real-time search trigger on pressing Enter
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') filterData();
        });

        function displayResults(data) {
            const container = document.getElementById('results-container');
            const countLabel = document.getElementById('results-count');
            container.innerHTML = '';
            
            countLabel.classList.remove('hidden');
            countLabel.innerText = `Showing ${data.length} records found`;

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full bg-white p-8 text-center rounded-lg border border-gray-200 text-gray-500 font-medium">
                        No matches found. Try matching specific names or block numbers.
                    </div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow flex flex-col justify-between";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start border-b border-gray-100 pb-2 mb-3">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">${item.name}</h3>
                                <p class="text-xs text-blue-600 font-semibold bg-blue-50 px-2 py-0.5 mt-1 inline-block rounded">${item.resType}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-sm font-bold text-gray-900 bg-gray-100 px-2.5 py-1 rounded block">
                                    ${item.block} - ${item.flat}
                                </span>
                            </div>
                        </div>
                        
                        <div class="space-y-1 text-sm text-gray-600">
                            <div><span class="font-medium text-gray-400">WhatsApp:</span> ${item.phone}</div>
                            <div><span class="font-medium text-gray-400">Vehicle(s):</span> <span class="uppercase font-mono text-gray-800">${item.vehicle || 'None Listed'}</span></div>
                            <div><span class="font-medium text-gray-400">Vehicle Type:</span> ${item.vType || 'N/A'}</div>
                        </div>
                    </div>
                    <div class="text-[10px] text-gray-400 text-right mt-4 border-t border-gray-50 pt-1">
                        Verified: ${item.timestamp}
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
